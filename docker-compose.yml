services:
  db-wallet:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: wallet_db
      MYSQL_USER: wallet_user
      MYSQL_PASSWORD: wallet_pass
    volumes:
      - db_wallet_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 5

  wallet:
    build:
      context: ./backend/apps/wallet
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      ILIACHALLENGE: ILIACHALLENGE
      JWT_SECRET: ILIACHALLENGE
      DATABASE_URL: mysql://wallet_user:wallet_pass@db-wallet:3306/wallet_db
    depends_on:
      db-wallet:
        condition: service_healthy

volumes:
  db_wallet_data:
