services:
  db-wallet:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: wallet_db
      MYSQL_USER: wallet_user
      MYSQL_PASSWORD: wallet_pass
    volumes:
      - db_wallet_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 5

  wallet:
    build:
      context: ./backend/apps/wallet
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      ILIACHALLENGE: ILIACHALLENGE
      JWT_SECRET: ILIACHALLENGE
      DATABASE_URL: mysql://wallet_user:wallet_pass@db-wallet:3306/wallet_db
    depends_on:
      db-wallet:
        condition: service_healthy

  db-users:
    image: mysql:8.0
    container_name: db-users
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: users
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - users_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 90s

  users:
    build:
      context: ./backend/apps/users
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      ILIACHALLENGE: ILIACHALLENGE
      DATABASE_URL: mysql://user:password@db-users:3306/users
    depends_on:
      db-users:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WALLET_API_URL: http://localhost:3001
        NEXT_PUBLIC_USERS_API_URL: http://localhost:3002
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
    depends_on:
      - wallet
      - users

volumes:
  db_wallet_data:
  users_mysql_data:
